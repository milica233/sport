<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportZone Arena</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- NAV -->
    <nav>
        <h1>SportZone</h1>
        <ul>
            <li><a href="index.html">Početna</a></li>
            <li><a href="usluge.html">Sportovi</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
        </ul>
    </nav>

    <main>
        <!-- HERO -->
        <header>
            <div class="overlay">
                <h2>Pokreni svoju sportsku energiju</h2>
                <p>Trening, timski duh i vrhunska zabava.</p>
                <button id="openForm">Prijavi se</button>
            </div>
        </header>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">

            <span id="closeModal">&times;</span>

            <h2>Registracija</h2>

            <form>
                <input type="text" placeholder="Ime i prezime" required>
                <input type="email" placeholder="Email adresa" required>
                <button type="submit">Pošalji</button>
            </form>

        </div>
    </div>

    <div id="sidebar" class="sidebar">

        <span id="closeSidebar">&times;</span>

        <h2>Registracija</h2>

        <form>
            <input type="text" placeholder="Ime i prezime" required>
            <input type="email" placeholder="Email adresa" required>
            <button type="submit">Pošalji</button>
        </form>

    </div>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 SportZone Arena</p>
    </footer>

    <script>        
        const openBtn = document.getElementById("openForm");
        const sidebar = document.getElementById("sidebar");
        const closeBtn = document.getElementById("closeSidebar");

        // otvori sidebar
        openBtn.onclick = function () {
            sidebar.classList.add("active");
        }

        // zatvori sidebar
        closeBtn.onclick = function () {
            sidebar.classList.remove("active");
        }
    </script>
</body>

</html>
